<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AudioGuide Admin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:#16213e;display:flex;flex-direction:column;padding:16px 0;flex-shrink:0}
.sidebar-logo{padding:0 16px 20px;font-size:18px;font-weight:700;color:#4fc3f7}
.nav-item{padding:10px 16px;cursor:pointer;border-radius:6px;margin:2px 8px;transition:background .2s;font-size:14px}
.nav-item:hover{background:#0f3460}
.nav-item.active{background:#0f3460;color:#4fc3f7}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#16213e;padding:12px 20px;font-size:16px;font-weight:600;border-bottom:1px solid #0f3460;display:flex;align-items:center;gap:12px}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex}
#view-map{flex-direction:row}
#view-routes,#view-settings{flex-direction:column;overflow-y:auto;padding:20px}
#map{flex:1;min-height:400px}
.panel{width:340px;background:#16213e;overflow-y:auto;padding:16px;border-left:1px solid #0f3460}
.panel h3{margin-bottom:14px;color:#4fc3f7;font-size:15px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#aaa;margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 10px;background:#0f3460;border:1px solid #1a4a8a;border-radius:6px;color:#e0e0e0;font-size:13px}
.form-group textarea{resize:vertical;min-height:70px}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#4fc3f7;color:#0a0a1a}
.btn-danger{background:#e53935;color:#fff}
.btn-success{background:#43a047;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.status{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.status-ok{background:#1b5e20;color:#a5d6a7}
.status-err{background:#b71c1c;color:#ef9a9a}
.status-wait{background:#333;color:#aaa}
.card{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:14px;margin-bottom:12px}
.card h4{font-size:14px;margin-bottom:6px;color:#4fc3f7}
.card p{font-size:12px;color:#aaa;margin-bottom:8px}
.drop-zone{border:2px dashed #1a4a8a;border-radius:6px;padding:14px;text-align:center;font-size:12px;color:#888;cursor:pointer;transition:border-color .2s;position:relative}
.drop-zone:hover,.drop-zone.dragover{border-color:#4fc3f7;color:#4fc3f7}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.preview-img{max-width:100%;max-height:120px;border-radius:4px;margin-top:8px}
.audio-player{width:100%;margin-top:8px}
.empty-state{text-align:center;padding:40px 20px;color:#555}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.badge-draft{background:#333;color:#aaa}
.badge-published{background:#1b5e20;color:#a5d6a7}
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.conn-dot.ok{background:#43a047}
.conn-dot.err{background:#e53935}
.conn-dot.wait{background:#666}
.loader{display:inline-block;width:14px;height:14px;border:2px solid #4fc3f7;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-bar{height:4px;background:#0f3460;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:#4fc3f7;width:0;transition:width .3s}
.leaflet-container{background:#1a2a3a}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">🗺 AudioGuide</div>
  <div class="nav-item active" onclick="showView('map')">📍 Карта точек</div>
  <div class="nav-item" onclick="showView('routes')">🛤 Маршруты</div>
  <div class="nav-item" onclick="showView('settings')">⚙️ Настройки</div>
  <div style="margin-top:auto;padding:12px 16px;font-size:11px;color:#555">
    <span class="conn-dot wait" id="dot"></span><span id="conn-label">Нет подключения</span>
  </div>
</div>
<div class="main">
  <div class="topbar"><span id="topbar-title">Карта точек</span></div>
  <div class="view active" id="view-map">
    <div id="map"></div>
    <div class="panel" id="point-panel">
      <h3 id="panel-title">Новая точка</h3>
      <div class="empty-state" id="panel-empty">Нажмите на карту чтобы создать точку или выберите маркер</div>
      <div id="panel-form" style="display:none">
        <div class="form-group"><label>Название *</label><input id="pt-title" placeholder="Введите название"></div>
        <div class="form-group"><label>Описание</label><textarea id="pt-desc" placeholder="Описание точки"></textarea></div>
        <div class="form-group"><label>Маршрут</label><select id="pt-route"><option value="">— без маршрута —</option></select></div>
        <div class="form-group"><label>Фото</label>
          <div class="drop-zone" id="photo-zone">
            <input type="file" accept="image/*" id="photo-input" onchange="uploadFile(this,'photo')">
            <span id="photo-label">Перетащите фото или нажмите</span>
          </div>
          <img id="photo-preview" class="preview-img" style="display:none">
          <div class="progress-bar" id="photo-progress" style="display:none"><div class="progress-fill" id="photo-fill"></div></div>
        </div>
        <div class="form-group"><label>Аудио</label>
          <div class="drop-zone" id="audio-zone">
            <input type="file" accept="audio/*" id="audio-input" onchange="uploadFile(this,'audio')">
            <span id="audio-label">Перетащите аудио или нажмите</span>
          </div>
          <audio id="audio-preview" class="audio-player" controls style="display:none"></audio>
          <div class="progress-bar" id="audio-progress" style="display:none"><div class="progress-fill" id="audio-fill"></div></div>
        </div>
        <div class="form-group"><label>Широта</label><input id="pt-lat" readonly></div>
        <div class="form-group"><label>Долгота</label><input id="pt-lon" readonly></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="savePoint()">Сохранить</button>
          <button class="btn btn-danger" id="btn-delete" onclick="deletePoint()" style="display:none">Удалить</button>
          <button class="btn btn-sm" onclick="closePanel()">Отмена</button>
        </div>
      </div>
    </div>
  </div>
  <div class="view" id="view-routes">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:18px">Маршруты</h2>
      <button class="btn btn-primary" onclick="openRouteModal()">+ Создать</button>
    </div>
    <div id="routes-list"><div class="empty-state">Нет маршрутов</div></div>
  </div>
  <div class="view" id="view-settings">
    <h2 style="font-size:18px;margin-bottom:20px">Настройки</h2>
    <div class="card">
      <h4>Backend URL</h4>
      <div class="form-group"><input id="api-url" placeholder="https://your-app.railway.app"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveApiUrl()">Сохранить и проверить</button>
      </div>
      <div id="conn-status" class="status status-wait" style="margin-top:10px;display:inline-block">Не проверено</div>
    </div>
  </div>
</div>
